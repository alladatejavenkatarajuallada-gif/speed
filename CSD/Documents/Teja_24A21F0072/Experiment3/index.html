<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 3 - JavaScript Objects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef3f8;
            padding-top: 40px;
        }
        .card-box {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            font-weight: bold;
            color: #333;
            margin-bottom: 25px;
        }
        #output {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #0d6efd;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card-box">

            <h1>EXPERIMENT-3 — JavaScript Objects</h1>

            <!-- Buttons -->
            <div class="d-flex flex-wrap gap-2 mb-3">
                <button id="displayInfo" class="btn btn-primary">Display Student Details</button>
                <button id="addProperty" class="btn btn-success">Add Passed Property</button>
                <button id="displayKeys" class="btn btn-warning text-dark">Display The Full Info</button>
            </div>

            <!-- Output Box -->
            <div id="output">
                <p class="mb-0">Results is Coming...</p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
