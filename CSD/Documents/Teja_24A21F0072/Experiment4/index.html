<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 4 - DOM Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef3f8;
            padding-top: 40px;
        }

        .card-box {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            font-weight: bold;
            margin-bottom: 25px;
        }

        #output {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #0d6efd;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        img {
            width: 300px;
            border-radius: 12px;
            border: 4px solid #0d6efd;
            transition: 0.3s ease-in-out;
        }

        img:hover {
            transform: scale(1.05);
            border-color: #198754;
        }

        #keyPressed {
            font-weight: bold;
            color: #0d6efd;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card-box">

            <h1>EXPERIMENT-4 — DOM Manipulation & Event Listeners</h1>

            <!-- Button Click Event -->
            <button id="clickMe" class="btn btn-primary mb-4">Click On Me</button>

            <!-- Mouse Over Event -->
            <div class="mb-4">
                <h3 class="text-success">Mouse Over Event</h3>
                <img id="imageElement" src="swrnlogo.png" alt="Image">
            </div>

            <!-- Key Press Event -->
            <div class="mb-4">
                <h3 class="text-danger">Key Press Event</h3>
                <p>Press any key on your keyboard</p>
                <p class="fw-bold">Key pressed: <span id="keyPressed">None yet</span></p>
            </div>

            <!-- Output Log -->
            <div id="output">
                <p class="mb-0">Event logs will appear here...</p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
