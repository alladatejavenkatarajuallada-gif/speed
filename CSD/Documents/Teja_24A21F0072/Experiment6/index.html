<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 6 - React Counter Component</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- React + Babel -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background: #eef3f8;
            padding: 40px 0;
            text-align: center;
        }

        .counter-box {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            max-width: 550px;
            margin: 0 auto;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            transition: 0.3s ease-in-out;
        }

        .counter-box:hover {
            transform: scale(1.02);
        }

        .count-value {
            font-size: 70px;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        // Counter Component using React Hooks
        const Counter = () => {
            const [count, setCount] = React.useState(0);
            const [loading, setLoading] = React.useState(true);

            // Simulate initial loading
            React.useEffect(() => {
                setTimeout(() => {
                    setLoading(false);
                }, 1200);
            }, []);

            // Functions
            const increment = () => setCount(prev => prev + 1);
            const decrement = () => setCount(prev => prev - 1);
            const doubleCount = () => setCount(prev => prev * 2);
            const tripleCount = () => setCount(prev => prev * 3);
            const resetCount = () => setCount(0);

            return (
                <div className="counter-box">
                    <h1 className="text-primary fw-bold mb-4">React Counter</h1>

                    {loading ? (
                        <p className="text-secondary fs-5">Loading initial data...</p>
                    ) : (
                        <>
                            <div className="count-value">{count}</div>

                            <div className="d-flex justify-content-center flex-wrap gap-2">

                                <button className="btn btn-danger" onClick={decrement}>
                                    − Decrement
                                </button>

                                <button className="btn btn-success" onClick={increment}>
                                    + Increment
                                </button>

                                <button className="btn btn-primary" onClick={doubleCount}>
                                    Double ×2
                                </button>

                                <button className="btn btn-warning text-dark" onClick={tripleCount}>
                                    Triple ×3
                                </button>

                                <button className="btn btn-outline-danger" onClick={resetCount}>
                                    Clear
                                </button>

                            </div>
                        </>
                    )}
                </div>
            );
        };

        // Render App
        ReactDOM.render(<Counter />, document.getElementById("root"));
    </script>

</body>
</html>
