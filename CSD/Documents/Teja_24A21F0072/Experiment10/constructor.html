<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constructor Function with Bootstrap</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #e3f2fd;
    }
    .card {
      border-radius: 15px;
    }
    .table th {
      width: 40%;
    }
  </style>

  <script>
    function Person(firstName, lastName, age) {
      this.firstName = firstName;
      this.lastName = lastName;
      this.age = age;
      this.fullName = firstName + "." + lastName;
    }
  </script>
</head>
<body>

  <div class="container py-5">
    <h2 class="text-center mb-4 text-primary fw-bold">Constructor Function Output</h2>

    <div class="row justify-content-center">
      <div class="col-md-6">

        <!-- Card Start -->
        <div class="card shadow p-4 mb-4">
          <h4 class="text-center">Person 1 Details</h4>
          <table class="table table-bordered mt-3">
            <tbody id="person1"></tbody>
          </table>
        </div>

        <div class="card shadow p-4">
          <h4 class="text-center">Person 2 Details</h4>
          <table class="table table-bordered mt-3">
            <tbody id="person2"></tbody>
          </table>
        </div>
        <!-- Card End -->

      </div>
    </div>
  </div>

  <script>
    const p1 = new Person("teja", "a", 40);
    const p2 = new Person("raju", "v", 22);

    document.getElementById("person1").innerHTML = `
      <tr><th>First Name</th><td>${p1.firstName}</td></tr>
      <tr><th>Last Name</th><td>${p1.lastName}</td></tr>
      <tr><th>Age</th><td>${p1.age}</td></tr>
      <tr><th>Full Name</th><td>${p1.fullName}</td></tr>
    `;

    document.getElementById("person2").innerHTML = `
      <tr><th>First Name</th><td>${p2.firstName}</td></tr>
      <tr><th>Last Name</th><td>${p2.lastName}</td></tr>
      <tr><th>Age</th><td>${p2.age}</td></tr>
      <tr><th>Full Name</th><td>${p2.fullName}</td></tr>
    `;
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
