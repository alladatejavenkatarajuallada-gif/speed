<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow Functions with Bootstrap</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #e3f2fd;
    }
    .card {
      border-radius: 15px;
    }
    #outputBox {
      min-height: 120px;
      background: #ffffff;
      border-radius: 10px;
      padding: 15px;
      font-size: 1.1rem;
      border: 2px solid #bbdefb;
    }
  </style>

  <script>
    // No arguments, no return
    const displayMsg = () => {
      document.getElementById("outputBox").innerHTML += "Hello, I am displayMsg() <br>";
    };

    // With arguments, with return
    const mult = (a, b) => {
      return a * b;
    };

    // With arguments, no return
    const sum = (x, y) => {
      let res = x + y;
      document.getElementById("outputBox").innerHTML += "The sum is: " + res + "<br>";
    };
  </script>
</head>

<body>
  <div class="container py-5">
    <h2 class="text-center mb-4 text-primary fw-bold">Arrow Functions Demo (Bootstrap UI)</h2>

    <div class="row justify-content-center">
      <div class="col-md-8">

        <!-- Card Start -->
        <div class="card shadow p-4">

          <h4 class="text-center mb-3">Function Buttons</h4>

          <div class="d-grid gap-3">

            <button class="btn btn-primary" onclick="displayMsg()">
              No Arguments & No Return
            </button>

            <button class="btn btn-success"
              onclick="document.getElementById('outputBox').innerHTML += 'The multiplication value is: ' + mult(234, 45) + '<br>'">
              With Arguments & With Return
            </button>

            <button class="btn btn-warning" onclick="sum(33, 55)">
              With Arguments & No Return
            </button>

          </div>

          <hr class="my-4">

          <h5>Output:</h5>
          <div id="outputBox"></div>

        </div>
        <!-- Card End -->

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
