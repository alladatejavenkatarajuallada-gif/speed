<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Polamuru Weather</title>

  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #e3f2fd, #bbdefb);
    }
    .weather-card {
      border-radius: 15px;
      background: white;
      padding: 20px;
    }
    .title {
      font-weight: 700;
      color: #0d47a1;
    }
  </style>
</head>

<body>

  <div class="container py-5">
    <h2 class="mb-4 text-center title">🌦 Polamuru Current Weather</h2>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="weather-card shadow-lg">
          <h5 class="mb-3">Weather Details</h5>

          <ul class="list-group">
            <li class="list-group-item"><strong>Temperature:</strong> <span id="temperature">Loading...</span> °C</li>
            <li class="list-group-item"><strong>Wind Speed:</strong> <span id="windSpeed">Loading...</span> km/h</li>
            <li class="list-group-item"><strong>Wind Direction:</strong> <span id="windDirection">Loading...</span>°</li>
            <li class="list-group-item"><strong>Weather Code:</strong> <span id="weatherCode">Loading...</span></li>
            <li class="list-group-item"><strong>Time:</strong> <span id="time">Loading...</span></li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript to fetch weather data -->
  <script>
    async function fetchWeather() {
      const latitude = 16.5193;
      const longitude = 80.6305;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=auto`;

      try {
        const response = await fetch(url);
        const data = await response.json();
        const weather = data.current_weather;

        // Update UI
        document.getElementById("temperature").textContent = weather.temperature;
        document.getElementById("windSpeed").textContent = weather.windspeed;
        document.getElementById("windDirection").textContent = weather.winddirection;
        document.getElementById("weatherCode").textContent = weather.weathercode;
        document.getElementById("time").textContent = weather.time;

      } catch (error) {
        document.querySelector(".weather-card").innerHTML =
          `<div class="alert alert-danger">Failed to load weather data.</div>`;
      }
    }

    // Call the function after 5 seconds (fixed)
    setTimeout(fetchWeather, 5000);
  </script>

</body>
</html>
