<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 1 - JavaScript Basics</title>

    <style>
        body {
            background-color: #f0f8ff; /* Light blue background */

        }
