<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 2 - String Manipulation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f4f8;
            padding-top: 40px;
        }
        .box-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #343a40;
            margin-bottom: 25px;
            font-weight: bold;
        }
        #results {
            background: #e9f7ff;
            border-radius: 10px;
            padding: 15px;
            border-left: 5px solid #0d6efd;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>
<div class="container">

    <div class="box-card">

        <h1>EXPERIMENT-2 — String Manipulation</h1>

        <!-- Input -->
        <div class="mb-3">
            <label for="inputString" class="form-label fw-bold">Enter a string:</label>
            <input type="text" id="inputString" class="form-control" placeholder="Type something...">
        </div>

        <!-- Buttons Row -->
        <div class="d-flex flex-wrap gap-2">
            <button id="checkLength" class="btn btn-primary">Check Length</button>
            <button id="extractJS" class="btn btn-success">Extract "JavaScript"</button>
            <button id="replaceWord" class="btn btn-warning text-dark">Replace Word</button>
            <button id="checkPalindrome" class="btn btn-danger">Check Palindrome</button>
        </div>

        <!-- Results -->
        <div id="results" class="mt-4">
            <p class="mb-0">Results will appear here...</p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
