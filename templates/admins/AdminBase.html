<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Speed Detection</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
    <style>
        /* General Styles */
        body {
            background-image: url("{% static 'img\gettyimages-1449013384-640x640.jpg' %}");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed; /* Ensure it stays in place while scrolling */
        }

        /* Navbar */
        .navbar-custom {
            background: rgba(44, 62, 80, 0.8); /* Semi-transparent dark blue */
            padding: 15px;
        }
        .navbar-brand {
            font-family: "Abril Fatface", serif;
            color: #fff;
            font-size: 1.5rem;
            text-transform: uppercase;
        }
        .nav-link-custom {
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            transition: color 0.3s ease;
            text-decoration: none;
            margin: 0 15px;
            padding: 5px 10px;
        }
        .nav-link-custom:hover {
            color: #1abc9c; /* Teal color for hover effect */
        }

        /* Hero Section */
        .hero-section {
            color: #fff;
            text-align: center;
            padding: 60px 30px;
            max-width: 700px;
            margin: 100px auto 0;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent black */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .hero-section h1 {
            font-size: 2.5rem;
            font-family: 'Abril Fatface', serif;
        }
        .hero-section p {
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            color: #f1f1f1;
            margin-top: 20px;
        }

        /* Footer */
        footer {
            background: rgba(44, 62, 80, 0.8); /* Semi-transparent dark blue */
            padding: 20px;
            text-align: center;
            color: #fff;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container">
                <a class="navbar-brand" href="#">Car Speed Detection</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a href="{% url 'AdminHome' %}" class="nav-link-custom">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="{% url 'UserDetails' %}" class="nav-link-custom">User Details</a>
                        </li>
                        <li class="nav-item">
                            <a href="{% url 'Home' %}" class="nav-link-custom">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        {% block contents %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 Car Speed Detection. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
