{% extends 'base.html' %}
{% load static %}
{% block contents %}
<section>
    <div class="container mt-5">
        <div class="card" style="width: 5in; margin: 0 auto; background-color: #e6f7ffc4; color: #003366be; border: 1px solid #007accc9;"> <!-- Custom card colors -->
            <div class="card-header" style="background-color: #007accd1; color: rgba(255, 255, 255, 0.826); text-align: center;"> <!-- Header with new colors -->
                <h3 style="font-weight: bold;">Admin Login Form</h3>
            </div>
            <div class="card-body" style="padding: 15px;"> <!-- Body with new text colors -->
                <form action="{% url 'AdminLoginCheck' %}" method='POST'>
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username" style="font-weight: bold; color: #003366c6;">Admin ID:</label> <!-- Label color -->
                        <input type="text" name="loginid" class="form-control" id="username" placeholder="Enter Admin ID">
                    </div>
                    <div class="form-group">
                        <label for="password" style="font-weight: bold; color: #003366cc;">Password:</label> <!-- Label color -->
                        <input type="password" name="pswd" class="form-control" id="password" placeholder="Password">
                    </div>
                    <div class="text-center mt-3">
                        <button type="submit" class="btn btn-primary" style="background-color: #007accc5; border: none;">Login</button>
                        <button type="reset" class="btn btn-secondary">Reset</button>
                    </div>
                    <br>
                    {% if messages %}
                    <div class="mt-3">
                        {% for message in messages %}
                        <p class="text-success">{{ message }}</p>
                        {% endfor %}
                    </div>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</section>
{% endblock %}
