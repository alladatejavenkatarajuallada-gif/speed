{% extends 'base.html' %}
{% load static %}
{% block contents %}
<section>
    <div class="container mt-5">
        <div class="card" style="width: 5in; margin: 0 auto; background-color: #ffefd5cc; color: #333333c5; border: 1px solid crimson;">  <!-- Custom card color -->
            <div class="card-header" style="background-color: rgba(220, 20, 60, 0.711); color: white;">  <!-- Header with different background -->
                <h3 class="text-center" style="font-weight: bold;">User Login Form</h3>
            </div>
            <div class="card-body" style="padding: 15px;">  
                <form method='POST' action="{% url 'UserLoginCheck' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="username" style="font-weight: bold;">User ID:</label>  
                        <input type="text" class="form-control" id="username" placeholder="Enter User ID" name="loginid">
                    </div>
                    <div class="form-group">
                        <label for="password" style="font-weight: bold;">Password:</label>  
                        <input type="password" class="form-control" id="password" placeholder="Password" name="pswd">
                    </div>
                    <div class="text-center mt-3">
                        <button type="submit" class="btn btn-primary">Login</button>
                        <button type="reset" class="btn btn-secondary">Reset</button>
                    </div>
                    {% if messages %}
                    <div class="mt-3">
                        {% for message in messages %}
                        <p class="text-success">{{ message }}</p>
                        {% endfor %}
                    </div>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</section>
{% endblock %}
